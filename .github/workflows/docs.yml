name: Documentation

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

concurrency: docs

# The Pages deployment authenticates through OIDC, hence id-token: write.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    name: Build and publish documentation
    # Manual runs always go through; release-triggered ones only on success.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7
        with:
          # A release pushes version bumps after it starts, so the event SHA is
          # already stale: always document the tip of the default branch.
          ref: ${{ github.event_name == 'workflow_run' && github.event.repository.default_branch || github.ref }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version

      - uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation
        run: pnpm run docs
        env:
          NODE_OPTIONS: --max_old_space_size=6144

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v5
